name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            generator: "MinGW Makefiles"
          - os: macos-latest
            name: macOS
            generator: "Unix Makefiles"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "${{ matrix.generator }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        working-directory: build
        run: cpack -C Release

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: mishchess-${{ matrix.name }}
          path: |
            build/MishChess-*.zip
            build/MishChess-*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/**
